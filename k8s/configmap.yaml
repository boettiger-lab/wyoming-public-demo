# LLM config template — NO LLM SECRETS.
#
# The PROXY_KEY lives only in the nginx config (see
# `wyoming-public-demo-nginx` below), which injects the Authorization
# header server-side via `proxy_set_header`. The browser only sees a
# relative `/api/llm` endpoint and never holds the key.
#
# MAPTILER_KEY is still passed through to the client because it is a
# domain-locked basemap key (referer-checked), not a bearer token like
# the LLM proxy key. If we later want to proxy MapTiler traffic too,
# add a /api/tiles/ location the same way.
#
# See ../../geo-agent-ops/SECRETS_EXPOSURE.md for the migration plan.
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: biodiversity
  name: wyoming-public-demo-config
data:
  config.template.json: |
    {
        "mcp_server_url": "${MCP_SERVER_URL}",
        "llm_model": "qwen",
        "llm_models": [
            {
                "value": "qwen",
                "label": "DSE-nimbus",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "glm-5",
                "label": "NRP GLM-5",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "qwen3",
                "label": "NRP Qwen3",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "gpt-oss",
                "label": "NRP GPT-OSS 120B",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "kimi",
                "label": "NRP Kimi K2.6",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "minimax-m2",
                "label": "NRP MiniMax M2.5",
                "endpoint": "/api/llm",
                "api_key": "unused"
            }
        ],
        "maptiler_key": "${MAPTILER_KEY}"
    }

---
# Nginx configuration — reverse-proxies /api/llm/ to open-llm-proxy and
# injects the Authorization header from ${PROXY_KEY} at container start.
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: biodiversity
  name: wyoming-public-demo-nginx
data:
  nginx.conf.template: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept";

        # IPv4-only: open-llm-proxy.nrp-nautilus.io advertises a AAAA (IPv6)
        # record, but pods have no working IPv6 egress. A literal-hostname
        # proxy_pass resolves once at startup and can latch onto the
        # unreachable IPv6 address, so connect() fails (101: Network
        # unreachable) → nginx marks the upstream down → intermittent 502s in
        # the browser (geo-agent-ops#64, open-llm-proxy#71). A runtime resolver
        # with ipv6=off + a variabled proxy_pass forces resolution back onto
        # IPv4 on every request. 10.96.0.10 is the in-cluster CoreDNS ClusterIP
        # (kube-dns); the nginx:alpine build here rejects `local=on`.
        # Remove once open-llm-proxy#71 lands the service-side AAAA fix.
        location ~ ^/api/llm/(.*)$ {
            resolver 10.96.0.10 ipv6=off valid=30s;
            set $llm_upstream "open-llm-proxy.nrp-nautilus.io";
            # A variabled proxy_pass drops nginx's implicit URI rewrite, so
            # reconstruct the /v1/ path (and any query string) from the regex
            # capture above.
            proxy_pass https://$llm_upstream:443/v1/$1$is_args$args;
            proxy_ssl_server_name on;
            proxy_ssl_name open-llm-proxy.nrp-nautilus.io;
            proxy_set_header Host open-llm-proxy.nrp-nautilus.io;
            proxy_set_header Authorization "Bearer ${PROXY_KEY}";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
