<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyoming Wildlife & Lands</title>

    <!--
        Geo-Chat core modules loaded from CDN.
        Pin to a tag (@v1.0.0) for production stability,
        or use @main for staging/development.
    -->
    <script type="importmap">
    {
        "imports": {
            "@modelcontextprotocol/sdk/client/index.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/index",
            "@modelcontextprotocol/sdk/client/streamableHttp.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/streamableHttp"
        }
    }
    </script>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

    <!--
        Basemap + terrain patch.
        Runs synchronously after maplibre-gl.js but before main.js.
        Replaces the CartoDB basemap with ESRI NatGeo and adds
        MapTiler terrain-RGB for 3D shading (key read from /config.json).
    -->
    <script>
    (() => {
        const OrigMap = maplibregl.Map;

        // Prefetch config.json now so the key is ready by the time
        // main.js creates the map (which happens after its own async fetches).
        const configPromise = fetch('/config.json')
            .then(r => r.json())
            .catch(() => ({}));

        let _terrainKey = '';
        let _map = null;

        // Basemap definitions
        const BASEMAPS = {
            natgeo: {
                source: {
                    type: 'raster',
                    tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256,
                    maxzoom: 16,
                    attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA'
                },
                terrain: true
            },
            satellite: {
                source: {
                    type: 'raster',
                    tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256,
                    maxzoom: 19,
                    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
                },
                terrain: true
            },
            plain: {
                source: {
                    type: 'raster',
                    tiles: ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    maxzoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>'
                },
                terrain: false
            }
        };

        // Global basemap switcher — called by UI buttons
        window._setBasemap = function(name) {
            if (!_map || !BASEMAPS[name]) return;
            // Toggle raster layer visibility
            Object.keys(BASEMAPS).forEach(key => {
                const vis = key === name ? 'visible' : 'none';
                if (_map.getLayer(key + '-base')) {
                    _map.setLayoutProperty(key + '-base', 'visibility', vis);
                }
            });
            // Toggle terrain
            if (_terrainKey && _map.getSource('terrain-dem')) {
                if (BASEMAPS[name].terrain) {
                    _map.setTerrain({ source: 'terrain-dem', exaggeration: 1.5 });
                } else {
                    _map.setTerrain(null);
                }
            }
            // Update button states
            document.querySelectorAll('.basemap-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.basemap === name);
            });
        };

        class WyomingMap extends OrigMap {
            constructor(options) {
                // Build style with all three basemap sources/layers (natgeo visible by default)
                options.style = {
                    version: 8,
                    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
                    sources: {
                        natgeo:    BASEMAPS.natgeo.source,
                        satellite: BASEMAPS.satellite.source,
                        plain:     BASEMAPS.plain.source
                    },
                    layers: [
                        { id: 'natgeo-base',    type: 'raster', source: 'natgeo',    layout: { visibility: 'visible' } },
                        { id: 'satellite-base', type: 'raster', source: 'satellite', layout: { visibility: 'none' } },
                        { id: 'plain-base',     type: 'raster', source: 'plain',     layout: { visibility: 'none' } }
                    ]
                };

                // Tilt for 3D terrain viewing
                options.pitch    = options.pitch    ?? 20;
                options.maxPitch = options.maxPitch ?? 75;

                super(options);
                _map = this;

                // After style loads: add terrain using the MapTiler key
                this.on('load', async () => {
                    try {
                        const cfg = await configPromise;
                        _terrainKey = cfg.maptiler_key || '';

                        if (_terrainKey) {
                            this.addSource('terrain-dem', {
                                type: 'raster-dem',
                                url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${_terrainKey}`,
                                tileSize: 256
                            });
                            this.setTerrain({ source: 'terrain-dem', exaggeration: 1.5 });
                        }

                    } catch (e) {
                        console.warn('[wyoming] terrain/sky setup failed:', e);
                    }
                });
            }
        }

        maplibregl.Map = WyomingMap;
    })();
    </script>

    <!-- PMTiles protocol -->
    <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

    <!-- h3-js (for hex grid overlay) -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>

    <!-- Core styles from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@main/app/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@main/app/chat.css">
</head>

<body>
    <!-- Map -->
    <div id="map"></div>

    <!-- Layer controls -->
    <div id="menu">
        <div class="menu-section">
            <label class="section-title">Basemap</label>
            <div class="basemap-toggle-group">
                <button class="basemap-btn active" data-basemap="natgeo"    onclick="window._setBasemap('natgeo')">NatGeo</button>
                <button class="basemap-btn"         data-basemap="satellite" onclick="window._setBasemap('satellite')">Satellite</button>
                <button class="basemap-btn"         data-basemap="plain"     onclick="window._setBasemap('plain')">Plain</button>
            </div>
        </div>
        <div class="menu-section">
            <label class="section-title">Overlays</label>
            <div id="layer-controls-container" class="checkbox-group">
                <!-- Generated by MapManager -->
            </div>
        </div>
    </div>

    <style>
        .basemap-toggle-group {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .basemap-btn {
            flex: 1;
            padding: 5px 6px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            background: rgba(255,255,255,0.06);
            color: rgba(0,0,0,0.75);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .basemap-btn:hover {
            background: rgba(255,255,255,0.14);
            color: #000;
        }
        .basemap-btn.active {
            background: rgba(134,194,116,0.35);
            border-color: #86C274;
            color: #000;
            font-weight: 600;
        }
    </style>

    <!-- Chat interface -->
    <div id="chat-container">
        <div id="chat-header">
            <h3>Data Assistant</h3>
            <button id="chat-toggle" title="Toggle chat">−</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Ask about the data…" autocomplete="off">
            <button id="chat-send">Send</button>
        </div>
        <div id="chat-footer">
            <select id="model-selector" title="Select model"></select>
        </div>
    </div>

    <!-- Boot from CDN — pin @v1.0.0 for production, @main for dev -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@main/app/main.js"></script>
</body>

</html>
